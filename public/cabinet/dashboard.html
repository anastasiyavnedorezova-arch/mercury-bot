<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mercury — Дашборд</title>
  <script src="/cabinet/layout.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', sans-serif; background: #F5F7FA; }

    /* ══════ CARD GRID ══════ */
    /* Desktop: flex-wrap, row 1 = три по 340px, row 2 = 340 + 700 */
    .dash-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
      align-content: flex-start;
      width: 100%;
      max-width: 1060px;
    }

    .dash-card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #E2E8F0;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Exact Figma sizes */
    .dash-card--balance  { width: 340px; height: 248px; }
    .dash-card--budget   { width: 340px; height: 248px; }
    .dash-card--goal     { width: 340px; height: 248px; }
    .dash-card--top5     { width: 340px; height: 360px; }
    .dash-card--trans    { width: 700px; height: 360px; }

    .dash-card__header { display: flex; align-items: center; gap: 10px; }
    .dash-card__title  { flex: 1; font-size: 14px; font-weight: 700; color: #6B7280; line-height: 20px; }

    /* Card body slot — карточки будут добавлены позже */
    .dash-card__body { flex: 1; }

    /* ══════ BALANCE CARD CONTENT ══════ */

    /* Empty state */
    .card-empty {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      padding: 0 24px;
      text-align: center;
    }
    .card-empty__bot { width: 50px; height: 50px; flex-shrink: 0; }
    .card-empty__text {
      font-size: 18px; font-weight: 600;
      color: #6B7280; line-height: 26px;
    }
    .card-empty__btn {
      height: 40px; padding: 10px 20px;
      background: #2FBF71; color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 14px; font-weight: 600;
      line-height: 20px; letter-spacing: 0.14px;
      cursor: pointer; white-space: nowrap;
      display: inline-flex; align-items: center;
      transition: opacity 150ms;
    }
    .card-empty__btn:hover { opacity: .88; }

    /* Data state */
    .card-balance-data {
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .card-balance__amount {
      font-size: 28px; font-weight: 600;
      line-height: 38px; letter-spacing: 0.56px;
      padding: 4px 0;
    }
    .card-balance__amount--pos   { color: #2FBF71; }
    .card-balance__amount--neg   { color: #E5484D; }
    .card-balance__amount--zero  { color: #9CA3AF; }

    .card-balance__row {
      display: flex; flex-direction: column;
      gap: 2px; padding: 4px 0;
    }
    .card-balance__label {
      font-size: 12px; font-weight: 500;
      color: #6B7280; line-height: 16px;
    }
    .card-balance__value {
      font-size: 20px; font-weight: 600;
      color: #2D3748; line-height: 27px;
      letter-spacing: 0.40px;
    }

    /* Skeleton inside card */
    .card-skeleton-wrap { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }

    /* Mobile overrides for balance card */
    @media (max-width: 900px) {
      .card-empty__text { font-size: 16px; line-height: 24px; }
      .card-balance__amount { font-size: 24px; line-height: 32px; letter-spacing: 0.24px; }
      .card-balance__value  { font-size: 18px; line-height: 26px; letter-spacing: 0.09px; }
    }


    /* ══════ BUDGET CARD ══════ */

    /* Forecast badge */
    .forecast-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 999px;
      font-size: 12px; font-weight: 500; line-height: 16px;
      white-space: nowrap;
    }
    .forecast-badge__dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .forecast-badge--info    { background: #EFF6FF; color: #1E40AF; }
    .forecast-badge--info    .forecast-badge__dot { background: #3B82F6; }
    .forecast-badge--good    { background: #E6F7EF; color: #1F7A4C; }
    .forecast-badge--good    .forecast-badge__dot { background: #2FBF71; }
    .forecast-badge--risk    { background: #FDECEC; color: #9B2C2C; }
    .forecast-badge--risk    .forecast-badge__dot { background: #E5484D; }

    /* Budget amount */
    .budget-amount {
      font-size: 28px; font-weight: 600;
      color: #2D3748; line-height: 38px; letter-spacing: 0.56px;
      padding: 4px 0;
    }

    /* Progress bar */
    .budget-progress-wrap {
      display: flex; flex-direction: column; gap: 6px;
    }
    .budget-progress-label {
      font-size: 12px; font-weight: 700;
      color: #6B7280; line-height: 16px;
    }
    .budget-progress-bar {
      width: 100%; height: 20px;
      background: #EFF6FF; border-radius: 4px;
      position: relative; overflow: hidden;
    }
    .budget-progress-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: #3B82F6; border-radius: 4px;
      transition: width 500ms ease;
    }
    .budget-forecast-text {
      font-size: 14px; font-weight: 400;
      color: #2D3748; line-height: 20px;
    }

    /* Locked overlay */
    .budget-locked-wrap {
      position: relative; overflow: hidden;
      border-radius: 12px; flex: 1;
      display: flex; flex-direction: column; gap: 12px;
    }
    .budget-locked-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.40);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 2;
      border-radius: 12px;
    }
    .budget-locked-overlay__text {
      color: #fff; font-size: 18px; font-weight: 600;
      line-height: 26px; text-align: center;
      max-width: 230px;
    }

    @media (max-width: 900px) {
      .budget-amount { font-size: 24px; line-height: 32px; letter-spacing: 0.24px; }
      .budget-forecast-text { font-size: 13px; line-height: 18px; }
      .budget-locked-overlay__text { font-size: 16px; line-height: 24px; }
    }

    /* ══════ RESPONSIVE ══════ */
    @media (max-width: 900px) {

      /* Mobile grid — full width column, adaptive card sizes */
      .dash-grid { flex-direction: column; gap: 12px; }
      .dash-card { border-radius: 20px; padding: 20px; width: 100% !important; height: auto !important; }
      .dash-card__title { font-size: 13px; line-height: 18px; }
      /* min-height to keep cards visible even when empty */
      .dash-card--balance,
      .dash-card--budget,
      .dash-card--goal    { min-height: 80px; }
      .dash-card--top5,
      .dash-card--trans   { min-height: 80px; }
    }

    /* ── Goal card ── */
    .goal-name { font-size: 24px; font-weight: 600; color: #2D3748; line-height: 1.2; }
    .goal-progress-label { font-size: 14px; color: #6B7280; margin-bottom: 6px; display: block; }
    .goal-progress-bar { width: 100%; height: 20px; background: #E6F7EF; border-radius: 4px; overflow: hidden; }
    .goal-progress-fill { height: 100%; background: #2FBF71; border-radius: 4px; transition: width 0.4s; }
    .goal-progress-value { font-size: 20px; font-weight: 600; color: #2D3748; margin-top: 8px; }
    .goal-next-btn {
      font-size: 13px; font-weight: 500; color: #6B7280; background: none; border: none;
      cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 0; white-space: nowrap;
    }
    .goal-next-btn:hover { color: #2D3748; }
    @media (max-width: 768px) {
      .goal-name { font-size: 20px; }
      .goal-progress-value { font-size: 18px; }
    }

    /* ══════ TRANSACTIONS CARD ══════ */

    /* Desktop table */
    .trans-table {
      width: 100%; overflow: hidden;
      border-radius: 12px;
      display: flex; flex-direction: column;
    }

    /* Desktop row */
    .trans-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #E2E8F0;
      background: #fff;
      gap: 8px;
    }
    .trans-row:last-child { border-bottom: none; }

    .trans-date {
      width: 92px; flex-shrink: 0;
      font-size: 14px; font-weight: 400; color: #6B7280;
      line-height: 20px; padding: 8px 0;
    }

    /* Type badge */
    .trans-type { width: 80px; flex-shrink: 0; padding: 8px 0; }
    .type-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 6px; border-radius: 4px;
      font-size: 12px; font-weight: 500; line-height: 16px;
      white-space: nowrap;
    }
    .type-badge__dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .type-badge--expense { background: #FFF7E6; color: #92400E; }
    .type-badge--expense .type-badge__dot { background: #F59E0B; }
    .type-badge--income  { background: #E6F7EF; color: #1F7A4C; }
    .type-badge--income  .type-badge__dot { background: #2FBF71; }

    /* Description */
    .trans-desc {
      display: flex; align-items: flex-start; gap: 10px;
      flex: 1; min-width: 0;
    }
    .trans-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 10px; display: flex;
      align-items: center; justify-content: center;
      font-size: 22px; line-height: 1;
    }
    .trans-icon--expense { background: #EAF2FF; }
    .trans-icon--income  { background: #E6F7EF; }
    .trans-cat-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 0; justify-content: center; }
    .trans-cat {
      font-size: 14px; font-weight: 700; color: #2D3748;
      line-height: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .trans-comment {
      font-size: 12px; font-weight: 500; color: #2D3748;
      opacity: 0.3; line-height: 16px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Amount */
    .trans-amount {
      width: 120px; flex-shrink: 0; text-align: right;
      font-size: 14px; font-weight: 600; line-height: 20px;
      padding: 8px 0; white-space: nowrap;
    }
    .trans-amount--expense { color: #2D3748; }
    .trans-amount--income  { color: #2FBF71; }

    /* ── Mobile layout ── */
    .trans-group { display: flex; flex-direction: column; padding-top: 8px; }
    .trans-group-date {
      font-size: 12px; font-weight: 700; color: #9CA3AF;
      line-height: 16px; margin-bottom: 0;
    }
    .trans-mob-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid #E2E8F0;
    }
    .trans-mob-row:last-child { border-bottom: none; }
    .trans-mob-amount {
      font-size: 14px; font-weight: 600; line-height: 20px;
      white-space: nowrap; text-align: right;
    }
    .trans-mob-amount--expense { color: #1E2A38; }
    .trans-mob-amount--income  { color: #2FBF71; }
    .trans-mob-comment { color: #6B7280; opacity: 1; }

    /* Hide desktop table on mobile, show mobile groups */
    .trans-desktop { display: flex; }
    .trans-mobile  { display: none; }
    @media (max-width: 900px) {
      .trans-desktop { display: none; }
      .trans-mobile  { display: flex; flex-direction: column; width: 100%; }
    }

    /* ══════ TOP-5 CARD ══════ */
    /* ══════ TOP-5 CARD ══════ */
    .top5-list {
      display: flex; flex-direction: column;
      width: 100%;
    }
    .top5-row {
      display: flex; align-items: center; gap: 10px;
      height: 56px; flex-shrink: 0;
    }
    .top5-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: #EAF2FF; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; line-height: 1;
    }
    .top5-info {
      flex: 1; display: flex; flex-direction: column;
      gap: 4px; min-width: 0;
    }
    .top5-name {
      font-size: 14px; font-weight: 700;
      color: #2D3748; line-height: 19px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .top5-amount {
      font-size: 12px; font-weight: 500;
      color: #6B7280; line-height: 16px;
    }
    .top5-bar-wrap {
      width: 100%; height: 4px;
      background: #EFF6FF; border-radius: 1000px;
      position: relative; overflow: hidden;
    }
    .top5-bar-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: #3B82F6; border-radius: 1000px;
      transition: width 500ms ease;
    }
  </style>
</head>
<body>

<!-- ══════ HEADER ══════ -->


<!-- ══════ PAGE ══════ -->
<div class="page-layout">

  

  <!-- MAIN -->
  <main class="page-content">
    <h1 class="page-title">Дашборд</h1>

    <div class="dash-grid">
      <!-- 1 — Баланс -->
      <div class="dash-card dash-card--balance" id="cardBalance">
        <div class="dash-card__header">
          <span class="dash-card__title">Баланс</span>
        </div>
        <div class="dash-card__body" id="bodyBalance"><div class="card-skeleton-wrap"><span class="lk-skeleton" style="width:60%;height:16px;"></span><span class="lk-skeleton" style="width:80%;height:36px;"></span><span class="lk-skeleton" style="width:50%;height:20px;"></span></div></div>
      </div>

      <!-- 2 — Бюджет -->
      <div class="dash-card dash-card--budget" id="cardBudget">
        <div class="dash-card__header">
          <span class="dash-card__title">Бюджет</span>
          <span class="forecast-badge forecast-badge--info" id="forecastBadge">
            <span class="forecast-badge__dot"></span>
            <span id="forecastText">Прогноз: -</span>
          </span>
        </div>
        <div class="dash-card__body" id="bodyBudget"></div>
      </div>

      <!-- 3 — Цель -->
      <div class="dash-card dash-card--goal" id="cardGoal">
        <div class="dash-card__header">
          <span class="dash-card__title">Цель</span>
          <div id="goalNavWrap"></div>
        </div>
        <div class="dash-card__body" id="bodyGoal"></div>
      </div>

      <!-- 4 — Топ-5 -->
      <div class="dash-card dash-card--top5" id="cardTop5">
        <div class="dash-card__header">
          <span class="dash-card__title">Топ-5 категорий расходов</span>
        </div>
        <div class="dash-card__body" id="bodyTop5"></div>
      </div>

      <!-- 5 — Последние транзакции -->
      <div class="dash-card dash-card--trans" id="cardTrans">
        <div class="dash-card__header">
          <span class="dash-card__title">Последние транзакции</span>
        </div>
        <div class="dash-card__body" id="bodyTrans"></div>
      </div>
    </div>

  </main>
</div>

<!-- MOBILE OVERLAY + DRAWER -->
</div>


<script>
  initLayout('dashboard');



  function renderHeader({username,subscription}) {
    const name = username||'Пользователь';
    let subHtml = '';
    if (subscription) {
      const d = fmtDate(subscription.ends_at);
      const dl = daysLeft(subscription.ends_at);
      const chip = dl<=30 ? `<span class="lk-badge">${dl} ${plural(dl)}</span>` : '';
      const lbl = subscription.status==='trial'?`Пробный период до ${d}`:`Подписка до ${d}`;
      subHtml = `<div class="lk-header__sub"><span class="lk-header__sub-text">${lbl}</span>${chip}</div>`;
    }
    const _lkUserInfo = document.getElementById('lkUserInfo');
    if (_lkUserInfo) _lkUserInfo.innerHTML =
      `<div class="lk-header__username">Кабинет: <strong>${name}</strong></div>${subHtml}`;

    let drawerSub = '';
    if (subscription) {
      const d = fmtDate(subscription.ends_at);
      const dl = daysLeft(subscription.ends_at);
      const chip = dl<=30 ? `<span class="lk-badge">${dl} ${plural(dl)}</span>` : '';
      const lbl = subscription.status==='trial'?`Пробный период до ${d}`:`Подписка до ${d}`;
      drawerSub = `<div class="lk-drawer__sub"><span class="lk-drawer__sub-text">${lbl}</span>${chip}</div>`;
    }
    const _drawerUserInfo = document.getElementById('drawerUserInfo');
    if (_drawerUserInfo) _drawerUserInfo.innerHTML =
      `<div class="lk-drawer__name">Кабинет: <strong>${name}</strong></div>${drawerSub}`;
  }

  // ══════════════════════════════════════════════════════
  // MAIN DASHBOARD LOADER
  // ══════════════════════════════════════════════════════
  async function loadDashboard() {
    const token = localStorage.getItem('mercury_token');
    if (!token) { window.location.replace('/cabinet/login'); return; }

    try {
      const res = await fetch('/api/dashboard', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.status === 401) { window.location.replace('/cabinet/login'); return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const d = await res.json();

      // Header
      window._dashSubStatus = d.user.subscription_status;
      window._dashExpenses = d.balance.expenses || 0;
      renderHeader({
        username: d.user.name,
        subscription: d.user.subscription_status
          ? { status: d.user.subscription_status, ends_at: d.user.subscription_end }
          : null
      });

      // Sidebar: unlock Budget & Analytics for trial/active
      const _hasSub = d.user.subscription_status === 'trial' || d.user.subscription_status === 'active';
      ['navBudget','navAnalytics','drawerNavBudget','drawerNavAnalytics'].forEach(function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        if (_hasSub) {
          el.classList.remove('is-disabled-sub');
          const subLabel = el.querySelector('.nav-item__sub');
          if (subLabel) subLabel.remove();
        }
      });

      // Balance
      renderBalanceCard(d.balance.income, d.balance.expenses);
      loadBudgetCard();

      // Goals
      goalsList = d.goals;
      goalIndex = 0;
      renderGoalCard(goalsList, 0);

      // Recent transactions
      renderTransCard(d.recent_transactions);

      // Top-5 categories
      renderTop5Card(d.top_categories);

    } catch (err) {
      console.error('[dashboard] load error:', err);
      const _lkUserInfoErr = document.getElementById('lkUserInfo');
    if (_lkUserInfoErr) _lkUserInfoErr.textContent = 'Ошибка загрузки';
    }
  }


  loadDashboard();

  // ══════════════════════════════════

  function fmtMoney(n) {
    // Format: "100 000.00 ₽" — Russian spaces as thousands sep
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₽';
  }

  function renderBalanceCard(income, expense) {
    const el = document.getElementById('bodyBalance');
    const balance = income - expense;

    // No data state
    if (income === 0 && expense === 0) {
      el.innerHTML = `
        <div class="card-empty">
          <img class="card-empty__bot" src="${BOT_SAD}" alt=""/>
          <span class="card-empty__text">Записей в этом месяце еще нет</span>
          <button class="card-empty__btn" onclick="openBotWidget()">Записать расход или доход</button>
        </div>`;
      // card keeps fixed height — restore it
      document.getElementById('cardBalance').style.height = '';
      return;
    }

    // Data state
    const amtClass = balance > 0 ? 'pos' : balance < 0 ? 'neg' : 'zero';
    el.innerHTML = `
      <div class="card-balance-data">
        <div class="card-balance__amount card-balance__amount--${amtClass}">${fmtMoney(balance)}</div>
        <div class="card-balance__row">
          <span class="card-balance__label">Доходы:</span>
          <span class="card-balance__value">${fmtMoney(income)}</span>
        </div>
        <div class="card-balance__row">
          <span class="card-balance__label">Расходы:</span>
          <span class="card-balance__value">${fmtMoney(expense)}</span>
        </div>
      </div>`;
  }

  function updateForecastBadge(type) {
    // type: 'none' | 'good' | 'risk'
    const badge = document.getElementById('forecastBadge');
    const text  = document.getElementById('forecastText');
    badge.className = 'forecast-badge';
    if (type === 'none') {
      badge.classList.add('forecast-badge--info');
      text.textContent = 'Прогноз: -';
    } else if (type === 'good') {
      badge.classList.add('forecast-badge--good');
      text.textContent = 'Прогноз: Благоприятный';
    } else if (type === 'risk') {
      badge.classList.add('forecast-badge--risk');
      text.textContent = 'Прогноз: Риск превышения';
    }
  }

  function renderBudgetCard(state, data) {
    const el = document.getElementById('bodyBudget');
    // state: 'locked' | 'no-data' | 'good' | 'risk'

    if (state === 'locked') {
      updateForecastBadge('good'); // show green (behind blur)
      el.innerHTML = `
        <div class="budget-locked-wrap" style="min-height:160px;">
          <!-- blurred bg content -->
          <div style="opacity:0.4;">
            <div class="budget-amount" style="color:#9CA3AF;">100 000.00 ₽</div>
            <div class="budget-progress-wrap">
              <span class="budget-progress-label">Израсходовано:</span>
              <div class="budget-progress-bar"><div class="budget-progress-fill" style="width:85%;"></div></div>
              <span class="budget-forecast-text">📌 По текущему темпу бюджет к концу месяца будет превышен примерно на [сумма] ₽.</span>
            </div>
          </div>
          <!-- overlay -->
          <div class="budget-locked-overlay">
            <img src="${LOCK_ICON}" width="24" height="24" alt=""/>
            <span class="budget-locked-overlay__text">Разблокируй функционал в подписке</span>
          </div>
        </div>`;
      return;
    }

    if (state === 'no-data') {
      updateForecastBadge('none');
      el.innerHTML = `
        <div class="card-empty">
          <img class="card-empty__bot" src="${BOT_SAD_BLUE}" alt=""/>
          <span class="card-empty__text">Бюджет на этот месяц еще не установлен</span>
          <button class="card-empty__btn" style="background:#1E2A38;" onclick="openBotWidget('budget')">Установить бюджет</button>
        </div>`;
      return;
    }

    // Has data: good or risk
    const { budget, spent, overBy } = data;
    const pct = Math.min((spent / budget) * 100, 100);
    const forecast = state === 'good' ? 'good' : 'risk';
    updateForecastBadge(forecast);

    const forecastMsg = state === 'good'
      ? 'Без учёта крупных трат, если сохранишь темп расходов — израсходуешь менее 100% своего бюджета 💛'
      : `📌 По текущему темпу бюджет к концу месяца будет превышен примерно на ${fmtMoney(overBy)}.`;

    el.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="budget-amount">${fmtMoney(budget)}</div>
        <div class="budget-progress-wrap">
          <span class="budget-progress-label">Израсходовано:</span>
          <div class="budget-progress-bar">
            <div class="budget-progress-fill" style="width:${pct.toFixed(1)}%;"></div>
          </div>
          <span class="budget-forecast-text">${forecastMsg}</span>
        </div>
      </div>`;
  }

  async function loadBudgetCard() {
    const status = window._dashSubStatus;
    if (!status || status === 'free') { renderBudgetCard('locked', null); return; }
    const token = localStorage.getItem('mercury_token');
    try {
      const now = new Date();
      const month = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      const res = await fetch('/api/budget?month=' + month, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) { renderBudgetCard('no-data', null); return; }
      const { data } = await res.json();
      if (!data || !data.length) { renderBudgetCard('no-data', null); return; }
      const totalBudget = data.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
      if (!totalBudget) { renderBudgetCard('no-data', null); return; }
      const spent = window._dashExpenses || 0;
      const daysTotal = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const daysPassed = now.getDate();
      const projected = daysPassed > 0 ? (spent / daysPassed) * daysTotal : 0;
      const overBy = Math.max(0, projected - totalBudget);
      renderBudgetCard(projected <= totalBudget ? 'good' : 'risk', { budget: totalBudget, spent, overBy });
    } catch (e) {
      renderBudgetCard('no-data', null);
    }
  }

  let goalsList = [];
  let goalIndex = 0;

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderGoalCard(goals, idx) {
    const el = document.getElementById('bodyGoal');
    const navWrap = document.getElementById('goalNavWrap');

    if (!goals || goals.length === 0) {
      if (navWrap) navWrap.innerHTML = '';
      el.innerHTML =
        '<div class="card-empty">' +
          '<img class="card-empty__bot" src="' + BOT_SAD_DARK + '" alt=""/>' +
          '<span class="card-empty__text">Упс, цель еще не установлена</span>' +
          '<button class="card-empty__btn" style="background:#1E2A38;" onclick="openBotWidget(\'goals\')">+ Добавить цель</button>' +
        '</div>';
      return;
    }

    if (navWrap) {
      navWrap.innerHTML = goals.length > 1
        ? '<button class="goal-next-btn" onclick="goalGoNext()">Следующая цель' +
          '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M7.5 5l5 5-5 5" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>'
        : '';
    }

    const goal   = goals[idx];
    const saved  = goal.saved  || 0;
    const target = goal.target_amount || 1;
    const pct    = Math.min((saved / target) * 100, 100);

    el.innerHTML =
      '<div style="display:flex;flex-direction:column;gap:12px;flex:1;">' +
        '<div class="goal-name">' + escHtml(goal.name) + '</div>' +
        '<div style="display:flex;flex-direction:column;">' +
          '<span class="goal-progress-label">Твой прогресс:</span>' +
          '<div class="goal-progress-bar">' +
            '<div class="goal-progress-fill" style="width:' + pct.toFixed(1) + '%;"></div>' +
          '</div>' +
          '<div class="goal-progress-value">' + fmtMoney(saved) + ' (' + Math.round(pct) + '%)</div>' +
        '</div>' +
      '</div>';
  }

  function goalGoNext() {
    goalIndex = (goalIndex + 1) % goalsList.length;
    renderGoalCard(goalsList, goalIndex);
  }
  window.goalGoNext = goalGoNext;

  function fmtDate(iso) {
    var d = new Date(iso);
    return [
      String(d.getDate()).padStart(2,'0'),
      String(d.getMonth()+1).padStart(2,'0'),
      d.getFullYear()
    ].join('.');
  }

  function fmtAmount(amount, type) {
    var abs = Math.abs(parseFloat(amount) || 0);
    var str = abs.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₽';
    return type === 'income' ? '+' + str : '-' + str;
  }

  function renderTransCard(transactions) {
    var el = document.getElementById('bodyTrans');

    if (!transactions || transactions.length === 0) {
      el.innerHTML =
        '<div class="card-empty">' +
          '<img class="card-empty__bot" src="' + BOT_SAD_TRANS + '" alt=""/>' +
          '<span class="card-empty__text">Записей в этом месяце еще нет</span>' +
        '</div>';
      return;
    }

    // ── Desktop table ──
    var desktopRows = '';
    transactions.forEach(function(t) {
      var isIncome  = t.type === 'income';
      var typeClass = isIncome ? 'income' : 'expense';
      var typeLabel = isIncome ? 'Доход' : 'Расход';
      var amtStr    = fmtAmount(t.amount, t.type);
      var icon      = getCatIcon(t.category || 'Другое');
      var comment   = t.comment ? '<div class="trans-comment">' + escHtml(t.comment) + '</div>' : '';

      desktopRows +=
        '<div class="trans-row">' +
          '<div class="trans-date">' + fmtDate(t.date || t.created_at) + '</div>' +
          '<div class="trans-type">' +
            '<span class="type-badge type-badge--' + typeClass + '">' +
              '<span class="type-badge__dot"></span>' + typeLabel +
            '</span>' +
          '</div>' +
          '<div class="trans-desc">' +
            '<div class="trans-icon trans-icon--' + typeClass + '">' + icon + '</div>' +
            '<div class="trans-cat-wrap">' +
              '<div class="trans-cat">' + escHtml(t.category || 'Другое') + '</div>' +
              comment +
            '</div>' +
          '</div>' +
          '<div class="trans-amount trans-amount--' + typeClass + '">' + amtStr + '</div>' +
        '</div>';
    });

    // ── Mobile groups (by date) ──
    var grouped = {};
    var dateOrder = [];
    transactions.forEach(function(t) {
      var d = fmtDate(t.date || t.created_at);
      if (!grouped[d]) { grouped[d] = []; dateOrder.push(d); }
      grouped[d].push(t);
    });

    var mobileRows = '';
    dateOrder.forEach(function(d) {
      mobileRows += '<div class="trans-group"><div class="trans-group-date">' + d + '</div>';
      grouped[d].forEach(function(t) {
        var isIncome  = t.type === 'income';
        var typeClass = isIncome ? 'income' : 'expense';
        var amtStr    = fmtAmount(t.amount, t.type);
        var icon      = getCatIcon(t.category || 'Другое');
        var comment   = t.comment ?
          '<div class="trans-comment trans-mob-comment">' + escHtml(t.comment) + '</div>' : '';

        mobileRows +=
          '<div class="trans-mob-row">' +
            '<div class="trans-icon trans-icon--' + typeClass + '">' + icon + '</div>' +
            '<div class="trans-cat-wrap" style="flex:1;min-width:0;">' +
              '<div class="trans-cat">' + escHtml(t.category || 'Другое') + '</div>' +
              comment +
            '</div>' +
            '<div class="trans-mob-amount trans-mob-amount--' + typeClass + '">' + amtStr + '</div>' +
          '</div>';
      });
      mobileRows += '</div>';
    });

    el.innerHTML =
      '<div class="trans-desktop"><div class="trans-table">' + desktopRows + '</div></div>' +
      '<div class="trans-mobile">' + mobileRows + '</div>';
  }

  async function loadTransCard() { /* handled by loadDashboard */ }


    function renderTop5Card(categories) {
    const el = document.getElementById('bodyTop5');

    if (!categories || categories.length === 0) {
      el.innerHTML =
        '<div class="card-empty">' +
          '<img class="card-empty__bot" src="' + BOT_SAD_TOP5 + '" alt=""/>' +
          '<span class="card-empty__text">Записей в этом месяце еще нет</span>' +
        '</div>';
      return;
    }

    const maxAmt = categories[0].amount;
    const total  = categories.reduce(function(s, c) { return s + c.amount; }, 0);

    var rows = '';
    categories.forEach(function(cat) {
      var pct     = total > 0 ? Math.round((cat.amount / total) * 100) : 0;
      var barPct  = maxAmt > 0 ? (cat.amount / maxAmt * 100).toFixed(1) : '0';
      var icon    = getCatIcon(cat.name);
      rows +=
        '<div class="top5-row">' +
          '<div class="top5-icon">' + icon + '</div>' +
          '<div class="top5-info">' +
            '<div class="top5-name">' + escHtml(cat.name) + '</div>' +
            '<div class="top5-amount">' + fmtInt(cat.amount) + ' ₽ (' + pct + '%)</div>' +
            '<div class="top5-bar-wrap"><div class="top5-bar-fill" style="width:' + barPct + '%;"></div></div>' +
          '</div>' +
        '</div>';
    });

    el.innerHTML = '<div class="top5-list">' + rows + '</div>';
  }

  async function loadTop5Card() { /* handled by loadDashboard */ }
  window.openLogoutModal = openLogoutModal;

</script>
