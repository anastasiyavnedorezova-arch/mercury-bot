<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Меркури — виджет бота</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --color-brand-main:    #1E2A38;
  --color-brand-primary: #4C9AFF;
  --color-accent-green:  #2FBF71;
  --color-white:         #FFFFFF;
  --color-bg-main:       #F5F7FA;
  --color-bg-alt:        #EEF2F6;
  --color-border:        #E2E8F0;
  --color-border-hard:   #CBD5E1;
  --color-text-main:     #2D3748;
  --color-text-second:   #6B7280;
  --color-text-disabled: #9CA3AF;
  --font: 'Manrope', sans-serif;
  --radius-widget: 24px;
  --radius-bubble: 18px;
  --radius-cta:    10px;
  --shadow-widget: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg:     0 16px 40px rgba(15,23,42,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--color-bg-main);-webkit-font-smoothing:antialiased}

/* ---- DEMO NAV ---- */
.demo-nav{background:var(--color-brand-main);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.demo-nav span{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-right:4px}
.demo-btn{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:600;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);background:none;cursor:pointer;transition:all 180ms;white-space:nowrap}
.demo-btn:hover,.demo-btn.active{background:var(--color-brand-primary);border-color:var(--color-brand-primary);color:#fff}

/* ---- DEMO VIEWPORT WRAPPER ---- */
.viewport{display:flex;justify-content:center;align-items:flex-start;padding:40px 24px;min-height:calc(100vh - 44px)}
body.mode-adaptive .demo-nav{display:none}
body.mode-adaptive .viewport{padding:0;min-height:100vh;align-items:stretch}
body.mode-adaptive{overflow:hidden}

/* ====================================================
   WIDGET — base shell
==================================================== */
.widget{
  background:var(--color-white);
  border:1px solid var(--color-border);
  border-radius:var(--radius-widget);
  box-shadow:var(--shadow-widget);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  /* size set per variant via JS */
}

/* ---- HEADER ---- */
.widget-header{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--color-bg-alt);
  border-radius:12px;
  padding:8px 16px;
  margin:16px 16px 0;
  flex-shrink:0;
}
.widget-header.compact{border-radius:8px;padding:6px 12px}
.header-bot{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.header-bot-name{font-size:18px;font-weight:600;color:var(--color-text-main);line-height:26px}
.header-bot-name.sm{font-size:16px;line-height:24px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mini-btn{height:24px;padding:4px 8px;border-radius:4px;background:var(--color-brand-main);color:#fff;font-family:var(--font);font-size:12px;font-weight:500;line-height:16px;border:none;cursor:pointer;white-space:nowrap;transition:background 150ms}
.mini-btn:hover{background:#2a3a4d}
.close-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;transition:background 150ms;border:none;background:none}
.close-btn:hover{background:rgba(0,0,0,.06)}

/* ---- CHAT AREA ---- */
.chat-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:0;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:4px}

/* ---- TIME LABEL ---- */
.time-label{
  font-size:11px;
  font-weight:500;
  line-height:13px;
  letter-spacing:.06px;
  color:var(--color-text-main);
  opacity:.5;
  margin-bottom:12px;
}
.time-label.right{text-align:right}

/* ---- BUBBLE ---- */
.bubble-wrap{display:flex;flex-direction:column;margin-bottom:10px}
.bubble-wrap.from-bot{align-items:flex-start}
.bubble-wrap.from-user{align-items:flex-end}

.bubble{
  position:relative;
  padding:6px 12px;
  border-radius:var(--radius-bubble);
  font-size:14px;
  font-weight:400;
  line-height:20px;
  max-width:85%;
  word-break:break-word;
}
.bubble.bot{
  background:var(--color-bg-alt);
  color:var(--color-text-main);
  border-bottom-left-radius:4px;
}
.bubble.user{
  background:var(--color-brand-primary);
  color:#fff;
  border-bottom-right-radius:4px;
}

/* Tail for bot bubble (left side) */
.bubble.bot::before{
  content:'';
  position:absolute;
  left:-8px;
  bottom:6px;
  width:0;
  height:0;
  border-top:10px solid transparent;
  border-right:10px solid var(--color-bg-alt);
  border-bottom:0px solid transparent;
}
/* Tail for user bubble (right side) */
.bubble.user::before{
  content:'';
  position:absolute;
  right:-8px;
  bottom:6px;
  width:0;
  height:0;
  border-top:10px solid transparent;
  border-left:10px solid var(--color-brand-primary);
  border-bottom:0px solid transparent;
}

/* ---- CTA BUTTONS (inline after bot message) ---- */
.cta-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:12px;
  padding-left:0;
}
.cta-btn{
  height:40px;
  padding:10px 16px;
  background:var(--color-white);
  border:1px solid var(--color-border);
  border-radius:var(--radius-cta);
  font-family:var(--font);
  font-size:14px;
  font-weight:600;
  line-height:20px;
  letter-spacing:.01em;
  color:var(--color-text-main);
  cursor:pointer;
  white-space:nowrap;
  transition:background 150ms, border-color 150ms;
}
.cta-btn:hover{background:var(--color-bg-alt);border-color:var(--color-border-hard)}
.cta-btn:active{transform:scale(.98)}

/* ---- INPUT BAR ---- */
.input-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  flex-shrink:0;
  border-top:1px solid var(--color-border);
  background:var(--color-white);
}
.input-bar.adaptive{gap:6px}
.chat-input{
  flex:1;
  padding:10px 14px;
  background:var(--color-white);
  border:1px solid var(--color-border-hard);
  border-radius:12px;
  font-family:var(--font);
  font-size:16px;
  font-weight:400;
  line-height:24px;
  color:var(--color-text-main);
  outline:none;
  transition:border-color 200ms, box-shadow 200ms;
}
.chat-input::placeholder{color:var(--color-text-disabled)}
.chat-input:focus{
  border-color:var(--color-brand-primary);
  box-shadow:0 0 0 3px rgba(76,154,255,.15);
}

/* ---- ROUND ICON BUTTONS ---- */
.icon-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--color-bg-alt);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;flex-shrink:0;
  transition:background 150ms;
}
.icon-btn:hover{background:var(--color-border)}

/* ====================================================
   WIDGET SIZE VARIANTS
==================================================== */
/* Desktop full — 600×720 */
.widget.full{width:600px;height:720px}
/* Desktop compact — 450×720 */
.widget.compact{width:450px;height:720px}
/* Adaptive / page /bot — full height */
.widget.adaptive{width:100%;max-width:100%;height:100vh;min-height:100vh;border-radius:0;}

/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--color-bg-alt);border-radius:18px;border-bottom-left-radius:4px;width:fit-content;margin-bottom:10px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--color-text-second);animation:blink 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* Scroll-to-bottom fade */
.chat-area::after{
  content:'';
  position:sticky;
  bottom:0;
  display:block;
  height:16px;
  background:linear-gradient(to bottom, transparent, var(--color-white));
  pointer-events:none;
  flex-shrink:0;
}

/* Entrance animation for new messages */
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble-wrap{animation:slideUp 200ms ease forwards}
.cta-wrap{animation:slideUp 240ms ease forwards}

/* Adaptive full-screen overrides */
body.mode-adaptive .widget-header {
  margin: 12px 12px 0;
  border-radius: 8px;
}
body.mode-adaptive .chat-area {
  padding: 16px 16px 8px;
}
body.mode-adaptive .input-bar {
  padding: 10px 16px 16px;
}

.adaptive-exit-bar{
  display:none;
  background:var(--color-brand-main);
  padding:8px 16px;
  font-size:12px;
  font-weight:600;
  color:rgba(255,255,255,.7);
  letter-spacing:.04em;
  text-transform:uppercase;
  gap:8px;
  align-items:center;
  flex-shrink:0;
}
.adaptive-exit-bar button{
  margin-left:auto;
  padding:4px 12px;
  border-radius:999px;
  border:1.5px solid rgba(255,255,255,.3);
  background:none;
  color:rgba(255,255,255,.8);
  font-family:var(--font);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all 150ms;
}
.adaptive-exit-bar button:hover{background:rgba(255,255,255,.1)}
body.mode-adaptive .adaptive-exit-bar{display:flex}
</style>
</head>

/* ============================================================
   CHAT RENDER ENGINE
============================================================ */
const chatArea = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');

function setAvatar(emotion) {
  document.getElementById('botAvatar').innerHTML = BOT_SVGS[emotion] || BOT_SVGS.glad;
}

function addTimeLabel(text, right = false) {
  const el = document.createElement('div');
  el.className = 'time-label' + (right ? ' right' : '');
  el.textContent = text;
  chatArea.appendChild(el);
}

function addBubble(sender, html, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap from-${sender}`;
  // reset animation
  wrap.style.animation = 'none';
  requestAnimationFrame(() => { wrap.style.animation = ''; });

  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function addCTA(buttons) {
  const wrap = document.createElement('div');
  wrap.className = 'cta-wrap';
  wrap.style.animation = 'none';
  requestAnimationFrame(() => { wrap.style.animation = ''; });

  buttons.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'cta-btn';
    btn.textContent = label;
    btn.onclick = () => handleCTA(label, wrap);
    wrap.appendChild(btn);
  });
  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chatArea.appendChild(el);
  scrollBottom();
  return el;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function scrollBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}

function botReply(html, delay = 900, ctaBtns = [], emotion = null) {
  return new Promise(resolve => {
    const typing = addTyping();
    setTimeout(() => {
      removeTyping(typing);
      if (emotion) setAvatar(emotion);
      addBubble('bot', html);
      if (ctaBtns.length) addCTA(ctaBtns);
      resolve();
    }, delay);
  });
}

/* ============================================================
   CTA HANDLER
============================================================ */
async function handleCTA(label, ctaWrap) {
  // disable all buttons in that wrap
  ctaWrap.querySelectorAll('.cta-btn').forEach(b => { b.disabled = true; b.style.opacity = '.5'; });

  addTimeLabel(nowTime(), true);
  addBubble('user', label);

  if (label.includes('Активировать')) {
    await botReply('Отлично! 🎉 Пробный период на 30 дней активирован. Теперь доступны все функции — бюджет, расширенные цели, аналитика по запросу и уведомления. Удачи! 💛', 900, ['☰ Меню'], 'love');
  } else if (label.includes('Исправить')) {
    await botReply('Что исправить — дату, сумму, категорию или тип?', 700, ['📅 Дату', '💸 Сумму', '📂 Категорию', '↩️ Отмена'], 'surprised');
  } else if (label.includes('Удалить')) {
    await botReply('Запись удалена 🗑', 600, [], 'sad');
  } else if (label.includes('расходы') || label.includes('Как записывать')) {
    await botReply('Просто пиши в свободной форме — <b>«кофе 250»</b>, <b>«такси 450»</b>, <b>«аренда 35000»</b>. Я сам определю тип, категорию и запишу. Можно голосовым или скриншотом из банка 📸', 900, ['Попробовать', '← Назад']);
  } else if (label.includes('целях') || label.includes('цел')) {
    await botReply('Финансовые цели помогают откладывать к конкретной дате. Я сам рассчитаю ежемесячный взнос с учётом инфляции или доходности вклада. Можно иметь до 3 целей одновременно 🎯', 900, ['Поставить цель', '← Назад']);
  } else if (label.includes('аналитик')) {
    await botReply('Аналитика показывает куда уходят деньги по категориям, динамику доходов и расходов, и предупреждает о риске превышения бюджета. На пробном и платном тарифе — запрос в любое время 📊', 900, ['Смотреть аналитику', '← Назад']);
  } else if (label.includes('бюджет')) {
    await botReply('Месячный бюджет помогает не тратить больше, чем планировалось. Я уведомлю когда достигнешь 50%, 80%, и если прогноз превысит 100% 💰', 900, ['Установить бюджет', '← Назад']);
  } else if (label.includes('Меню') || label.includes('меню')) {
    await botReply('Главное меню:', 600, ['📊 Аналитика', '🎯 Моя цель', '💰 Мой бюджет', '📋 История', '⚙️ Настройки', '💬 Обратная связь'], 'happy');
  } else {
    await botReply('Понял! Скоро отвечу подробнее 😊', 600, []);
  }
}

/* ============================================================
   INPUT SEND
============================================================ */
chatInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && chatInput.value.trim()) {
    const text = chatInput.value.trim();
    chatInput.value = '';
    addTimeLabel(nowTime(), true);
    addBubble('user', text);

    // Simple intent matching
    const t = text.toLowerCase();
    if (/\d+/.test(t) && (t.includes('руб') || /[а-я]+\s*\d+|\d+\s*[а-я]+/.test(t))) {
      // Looks like an expense
      const amount = text.match(/\d+/)?.[0] || '???';
      await botReply(
        `Записал ✅<br>📅 Дата: ${today()}<br>📌 Тип: расход<br>📂 Категория: Прочее<br>💸 Сумма: ${Number(amount).toLocaleString('ru')} ₽`,
        900, ['✏️ Исправить', '🗑 Удалить'], 'happy'
      );
    } else if (t.includes('привет') || t.includes('hello')) {
      await botReply('Привет! 👋 Как дела? Что записать сегодня?', 700, ['Записать расход', 'Записать доход', '☰ Меню'], 'love');
    } else if (t.includes('аналит')) {
      await botReply('Открываю аналитику за текущий месяц...', 600, [], 'glad');
    } else {
      await botReply('Не совсем понял 🤔 Попробуй написать в формате <b>«категория сумма»</b>, например <b>«продукты 1500»</b>', 800, [], 'sad');
    }
  }
});

/* ============================================================
   VARIANT SWITCHER
============================================================ */
function setVariant(v) {
  const widget = document.getElementById('widget');
  const header = document.getElementById('widgetHeader');
  const botName = document.getElementById('botName');
  const closeBtn = document.getElementById('closeBtn');
  const inputBar = document.getElementById('inputBar');

  widget.className = `widget ${v}`;
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.toggle('active',
    b.textContent.toLowerCase().includes(v === 'full' ? 'полный' : v === 'compact' ? 'компактный' : 'адаптив')
  ));

  // body class drives full-screen mode
  document.body.classList.toggle('mode-adaptive', v === 'adaptive');

  if (v === 'full') {
    header.className = 'widget-header';
    botName.className = 'header-bot-name';
    closeBtn.style.display = 'none';
    inputBar.className = 'input-bar';
    // restore demo-nav visibility handled by CSS
  } else if (v === 'compact') {
    header.className = 'widget-header compact';
    botName.className = 'header-bot-name';
    closeBtn.style.display = 'flex';
    inputBar.className = 'input-bar';
  } else { // adaptive
    header.className = 'widget-header compact';
    botName.className = 'header-bot-name sm';
    // In adaptive the close btn acts as "back" — hide it, navigation handled outside
    closeBtn.style.display = 'none';
    inputBar.className = 'input-bar adaptive';
  }
}

/* ============================================================
   SCENARIO SWITCHER (from demo nav)
============================================================ */
function loadScenario(s) {
  document.querySelectorAll('.demo-btn[data-scenario]').forEach(b => b.classList.toggle('active', b.dataset.scenario === s));
  if (s === 'expense') loadExpense();
  else if (s === 'analytics') loadAnalytics();
  else loadOnboarding();
}

/* ============================================================
   UTILS
============================================================ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function today() {
  return new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}
function nowTime() {
  return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}
