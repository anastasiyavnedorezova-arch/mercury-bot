    /* ── Card ── */
    .reg-card {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-radius: 32px;
      border: 1px solid #E2E8F0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 12px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    .reg-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reg-header__bot {
      width: 100px;
      height: 100px;
      flex-shrink: 0;
    }
    .reg-header__text { display: flex; flex-direction: column; gap: 8px; }
    .reg-header__title {
      font-size: 32px;
      font-weight: 600;
      color: #2D3748;
      line-height: 40px;
    }
    .reg-header__sub {
      font-size: 12px;
      font-weight: 500;
      color: #9CA3AF;
      line-height: 16px;
    }

    /* ── Fields ── */
    .reg-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .reg-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .reg-field__label {
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      line-height: 16px;
    }
    .reg-field__input {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #2D3748;
      line-height: 24px;
      background: #fff;
      border: 1px solid #CBD5E1;
      border-radius: 12px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }
    .reg-field__input::placeholder { color: #9CA3AF; }
    .reg-field__input:focus {
      border-color: #4C9AFF;
      box-shadow: 0 0 0 3px rgba(76,154,255,0.15);
    }
    /* Error state — Figma: bg #FDECEC, outline #E5484D */
    .reg-field__input.is-error {
      background: #FDECEC;
      border-color: #E5484D;
      box-shadow: none;
      color: #2D3748;
    }
    .reg-field__input.is-error:focus {
      background: #FDECEC;
      border-color: #E5484D;
      box-shadow: 0 0 0 3px rgba(229,72,77,0.12);
    }
    /* Helper text — Figma: #9B2C2C, 12px, padding-left 14px */
    .reg-field__hint {
      font-size: 12px;
      font-weight: 500;
      color: #9B2C2C;
      line-height: 16px;
      padding: 0 14px;
      display: none;
    }
    .reg-field__hint.is-visible { display: block; }

    /* ── Checkboxes ── */
    .reg-checks {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .reg-check {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 4px 0;
      cursor: pointer;
    }
    .reg-check__box {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 6px;
      border: 1.5px solid #CBD5E1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0;
      transition: border-color 150ms ease, background 150ms ease;
      cursor: pointer;
      flex-shrink: 0;
    }
    .reg-check__box.is-checked {
      background: #4C9AFF;
      border-color: #4C9AFF;
    }
    .reg-check__box.is-error {
      border-color: #E5484D;
      background: #fff;
    }
    .reg-check__box svg { display: none; }
    .reg-check__box.is-checked svg { display: block; }

    .reg-check__text {
      font-size: 12px;
      font-weight: 500;
      color: #2D3748;
      line-height: 16px;
      flex: 1;
    }
    .reg-check__text.is-error { color: #E5484D; }
    .reg-check__text a {
      color: #4C9AFF;
      font-weight: 700;
      text-decoration: underline;
    }
    .reg-check__text.is-error a { color: #E5484D; }

    /* ── Submit button ── */
    .reg-submit-wrap { padding-top: 4px; }
    .reg-submit {
      width: 100%;
      height: 40px;
      background: #4C9AFF;
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.14px;
      line-height: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 150ms ease;
      position: relative;
      overflow: hidden;
    }
    .reg-submit:hover:not(:disabled):not(.is-loading) { background: #3B82F6; }
    .reg-submit:active:not(:disabled):not(.is-loading) { background: #2563EB; }
    .reg-submit:disabled,
    .reg-submit.is-disabled {
      background: #EEF2F6;
      color: #9CA3AF;
      cursor: not-allowed;
    }
    /* Loading state: same grey bg + animated progress bar */
    .reg-submit.is-loading {
      background: #EEF2F6;
      color: #9CA3AF;
      pointer-events: none;
    }
    .reg-submit.is-loading::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 2px;
      border-radius: 999px;
      background: #E2E8F0;
      overflow: hidden;
    }
    .reg-submit.is-loading::before {
      content: '';
      position: absolute;
      bottom: 6px;
      left: calc(50% - 50px);
      width: 52px;
      height: 2px;
      border-radius: 999px;
      background: #9CA3AF;
      animation: loadingBar 1.2s ease-in-out infinite;
    }
    @keyframes loadingBar {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(48px); }
      100% { transform: translateX(0); }
    }

    /* ── Divider ── */
    .reg-divider {
      height: 1px;
      background: #CBD5E1;
      margin: 0 8px;
    }

    /* ── Social login ── */
    .reg-social {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .reg-social__label {
      font-size: 12px;
      font-weight: 500;
      color: #6B7280;
      line-height: 16px;
      white-space: nowrap;
    }
    .reg-social__btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
      padding: 0;
      background: linear-gradient(180deg, #2AABEE 0%, #229ED9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 150ms ease;
      text-decoration: none;
    }
    .reg-social__btn:hover { opacity: 0.85; }
    .reg-social__btn svg { display: block; }

    /* ── Success state ── */
    .reg-success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 0;
      text-align: center;
    }
    .reg-success.is-visible { display: flex; }
    .reg-success__icon { font-size: 48px; }
    .reg-success__title { font-size: 24px; font-weight: 600; color: #2D3748; }
    .reg-success__sub { font-size: 14px; color: #6B7280; }

    /* ── Spinner on button ── */
    .reg-submit.is-loading {
      pointer-events: none;
      background: #4C9AFF;
      opacity: 0.7;
    }

    /* ── Mobile ── */
    @media (max-width: 560px) {
      body { padding: 0; align-items: flex-start; }
      .reg-card {
        max-width: 100%;
        border-radius: 0;
        border: none;
        box-shadow: none;
        padding: 28px 20px 120px;
        gap: 24px;
      }
      .reg-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
        padding-top: 24px;
      }
      .reg-header__bot { width: 50px; height: 50px; }
      .reg-header__title { font-size: 24px; line-height: 32px; text-align: center; }
      .reg-header__sub { text-align: center; }
      .reg-fields { padding-top: 24px; }
      .reg-social {
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }
    }
  </style>
</head>

<script>
  // ── Config ────────────────────────────────────────────────
  const SUPABASE_URL     = 'https://ijvkcskzvwluntrsbcsj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlqdmtjc2t6dndsdW50cnNiY3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA0NTQsImV4cCI6MjA5MDQzNjQ1NH0.v0_KK-NQ-MjVTGhbyYDVwZf-WHEmN4qkFATt31YfTSg';
  // ─────────────────────────────────────────────────────────

  // ── State ─────────────────────────────────────────────────
  let termsChecked  = false;
  let newsChecked   = false;

  // ── Elements ──────────────────────────────────────────────
  const fieldEmail    = document.getElementById('fieldEmail');
  const fieldPassword = document.getElementById('fieldPassword');
  const hintEmail     = document.getElementById('hintEmail');
  const hintPassword  = document.getElementById('hintPassword');
  const checkTermsBox  = document.getElementById('checkTermsBox');
  const checkTermsText = document.getElementById('checkTermsText');
  const checkNewsBox   = document.getElementById('checkNewsBox');
  const submitBtn      = document.getElementById('submitBtn');

  // ── Helpers ───────────────────────────────────────────────
  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim());
  }

  function setFieldError(input, hint, message) {
    input.classList.add('is-error');
    hint.textContent = message;
    hint.classList.add('is-visible');
  }

  function clearFieldError(input, hint) {
    input.classList.remove('is-error');
    hint.classList.remove('is-visible');
    hint.textContent = '';
  }

  function getEmailError() {
    const v = fieldEmail.value.trim();
    if (!v) return 'Обязательное поле';
    if (!isValidEmail(v)) return 'Ошибка проверки, пожалуйста, введите корректный e-mail';
    return null;
  }

  function getPasswordError() {
    const v = fieldPassword.value;
    if (!v) return 'Обязательное поле';
    if (v.length < 6) return 'Минимум 6 символов';
    return null;
  }

  function updateSubmitState() {
    const hasEmailErr    = !!getEmailError() && fieldEmail.dataset.touched === '1';
    const hasPasswordErr = !!getPasswordError() && fieldPassword.dataset.touched === '1';
    const hasTermsErr    = !termsChecked && checkTermsBox.dataset.touched === '1';
    submitBtn.disabled   = hasEmailErr || hasPasswordErr || hasTermsErr;
  }

  // ── Email ─────────────────────────────────────────────────
  fieldEmail.addEventListener('input', () => {
    fieldEmail.dataset.touched = '1';
    const err = getEmailError();
    if (err) setFieldError(fieldEmail, hintEmail, err);
    else     clearFieldError(fieldEmail, hintEmail);
    updateSubmitState();
  });
  fieldEmail.addEventListener('blur', () => {
    if (fieldEmail.value.length > 0 || fieldEmail.dataset.touched) {
      fieldEmail.dataset.touched = '1';
      const err = getEmailError();
      if (err) setFieldError(fieldEmail, hintEmail, err);
      else     clearFieldError(fieldEmail, hintEmail);
      updateSubmitState();
    }
  });

  // ── Password ──────────────────────────────────────────────
  fieldPassword.addEventListener('input', () => {
    fieldPassword.dataset.touched = '1';
    const err = getPasswordError();
    if (err) setFieldError(fieldPassword, hintPassword, err);
    else     clearFieldError(fieldPassword, hintPassword);
    updateSubmitState();
  });
  fieldPassword.addEventListener('blur', () => {
    if (fieldPassword.value.length > 0 || fieldPassword.dataset.touched) {
      fieldPassword.dataset.touched = '1';
      const err = getPasswordError();
      if (err) setFieldError(fieldPassword, hintPassword, err);
      else     clearFieldError(fieldPassword, hintPassword);
      updateSubmitState();
    }
  });

  // ── Checkbox: terms ───────────────────────────────────────
  function toggleTerms(e) {
    if (e.target.tagName === 'A') return;
    checkTermsBox.dataset.touched = '1';
    termsChecked = !termsChecked;
    checkTermsBox.classList.toggle('is-checked', termsChecked);
    // Clear error when checked
    if (termsChecked) {
      checkTermsBox.classList.remove('is-error');
      checkTermsText.classList.remove('is-error');
    }
    checkTermsBox.setAttribute('aria-checked', termsChecked);
    updateSubmitState();
  }
  document.getElementById('checkTermsLabel').addEventListener('click', toggleTerms);
  checkTermsBox.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleTerms(e); }
  });

  // ── Checkbox: news ────────────────────────────────────────
  function toggleNews(e) {
    newsChecked = !newsChecked;
    checkNewsBox.classList.toggle('is-checked', newsChecked);
    checkNewsBox.setAttribute('aria-checked', newsChecked);
  }
  document.getElementById('checkNewsLabel').addEventListener('click', toggleNews);
  checkNewsBox.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleNews(e); }
  });

  // ── Form submit ───────────────────────────────────────────
  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    // Mark all required fields as touched
    fieldEmail.dataset.touched    = '1';
    fieldPassword.dataset.touched = '1';
    checkTermsBox.dataset.touched = '1';

    // Scenario 1 & 3: email errors
    const emailErr = getEmailError();
    if (emailErr) setFieldError(fieldEmail, hintEmail, emailErr);
    else          clearFieldError(fieldEmail, hintEmail);

    // Scenario 2: password errors
    const passErr = getPasswordError();
    if (passErr) setFieldError(fieldPassword, hintPassword, passErr);
    else         clearFieldError(fieldPassword, hintPassword);

    // Scenario 4: terms not accepted
    if (!termsChecked) {
      checkTermsBox.classList.add('is-error');
      checkTermsText.classList.add('is-error');
    }

    if (emailErr || passErr || !termsChecked) {
      updateSubmitState();
      return;
    }

    submitBtn.classList.add('is-loading');
    submitBtn.textContent = 'Создаём аккаунт…';

    const name     = document.getElementById('fieldName').value.trim();
    const email    = fieldEmail.value.trim().toLowerCase();
    const password = fieldPassword.value;
    const telegram = document.getElementById('fieldTelegram').value.trim().replace(/^@/, '');

    // ── If no anon key: show dev message ──────────────────
    if (SUPABASE_ANON_KEY === 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlqdmtjc2t6dndsdW50cnNiY3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA0NTQsImV4cCI6MjA5MDQzNjQ1NH0.v0_KK-NQ-MjVTGhbyYDVwZf-WHEmN4qkFATt31YfTSg') {
      setTimeout(() => {
        submitBtn.classList.remove('is-loading');
        submitBtn.textContent = 'Создать аккаунт';
        showSuccess();
      }, 800);
      return;
    }

    try {
      // 1. Sign up via Supabase Auth
      const authRes = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });
      const authData = await authRes.json();

      if (!authRes.ok || authData.error) {
        throw new Error(authData.error?.message || authData.msg || 'Ошибка регистрации');
      }

      const userId = authData.user?.id;

      // 2. Insert into users table (web channel)
      await fetch(`${SUPABASE_URL}/rest/v1/users`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${authData.access_token}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          id:                     userId,
          channel:                'web',
          external_id:            userId,
          username:               name || null,
          email:                  email,
          telegram_username:      telegram || null,
          terms_accepted_at:      new Date().toISOString(),
          terms_version:          '1.0',
          email_letters_accepted: newsChecked,
          created_at:             new Date().toISOString(),
          last_active_at:         new Date().toISOString()
        })
      });

      showSuccess();

    } catch (err) {
      console.error('Registration error:', err);
      submitBtn.classList.remove('is-loading');
      submitBtn.textContent = 'Создать аккаунт';
      // Show error near email field
      fieldEmail.classList.add('is-error');
      hintEmail.textContent = err.message || 'Произошла ошибка. Попробуйте ещё раз.';
      hintEmail.classList.add('is-visible');
    }
  });

  // ── Show success / redirect to onboarding ─────────────────
  function showSuccess() {
    document.getElementById('regForm').style.display = 'none';
    document.querySelector('.reg-header').style.display = 'none';
    document.querySelector('.reg-divider').style.display = 'none';
    document.querySelector('.reg-social').style.display = 'none';
    document.getElementById('regSuccess').classList.add('is-visible');
    // TODO: redirect to onboarding after 1.5s
    // setTimeout(() => { window.location.href = '/onboarding'; }, 1500);
  }
</script>
</body>
